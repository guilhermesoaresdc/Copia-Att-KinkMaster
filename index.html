<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KinkMaster - Guia de Exploração Segura</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind via CDN for simplicity in this hybrid setup -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              brand: {
                50: '#fdf8f4',
                100: '#faebd9',
                200: '#f5d5b7',
                300: '#eec094',
                400: '#e5aa72',
                500: '#c67a47',
                600: '#9a532a',
                700: '#783c1b',
                800: '#5a2a11',
                900: '#3d1a09',
                950: '#210b03',
              },
              dark: {
                900: '#0f0f11',
                800: '#18181b',
                700: '#27272a',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #0f0f11; color: #f4f4f5; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #18181b; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #52525b; }
      
      /* Quill Dark Theme Overrides */
      .quill-dark-theme .ql-toolbar {
        background-color: #18181b; /* hover:bg-dark-800 */
        border-color: #27272a !important; /* border-dark-700 */
        border-top-left-radius: 0.5rem;
        border-top-right-radius: 0.5rem;
      }
      .quill-dark-theme .ql-container {
        background-color: #0f0f11; /* bg-dark-900 */
        border-color: #27272a !important;
        border-bottom-left-radius: 0.5rem;
        border-bottom-right-radius: 0.5rem;
        min-height: 200px;
        font-family: inherit;
      }
      .quill-dark-theme .ql-editor {
        min-height: 200px;
        font-size: 1rem;
        color: #e5e7eb; /* text-white */
      }
      .quill-dark-theme .ql-stroke {
        stroke: #9ca3af !important; /* text-gray-400 */
      }
      .quill-dark-theme .ql-fill {
        fill: #9ca3af !important;
      }
      .quill-dark-theme .ql-picker {
        color: #9ca3af !important;
      }
      .quill-dark-theme .ql-active .ql-stroke, 
      .quill-dark-theme button:hover .ql-stroke {
        stroke: #e5e7eb !important; /* text-white hover */
      }
      .quill-dark-theme .ql-active .ql-fill, 
      .quill-dark-theme button:hover .ql-fill {
        fill: #e5e7eb !important;
      }
      .quill-dark-theme.flex {
        display: flex;
        flex-direction: column;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
